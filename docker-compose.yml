services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  wedding-planning:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
    environment:
      - PORT=8000
      - REDIRECT_URL_AFTER_AUTH_BASE=http://localhost:5173
      - REDIRECT_URL_DURING_AUTH_BASE=http://localhost:8000
      - REDISCLOUD_URL=redis://redis:6379
      - HOT_RELOAD=true
    env_file:
      - .env
    depends_on:
      - redis

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.dev
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - frontend_node_modules:/app/node_modules
    environment:
      - BACKEND_URL=http://wedding-planning:8000
    depends_on:
      - wedding-planning

volumes:
  frontend_node_modules:
